<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FontFeels</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Abril+Fatface&family=Alfa+Slab+One&family=Architects+Daughter&family=Bebas+Neue&family=Caveat:wght@400;700&family=Dancing+Script:wght@400;700&family=DM+Serif+Display:ital@0;1&family=Exo+2:ital,wght@0,200;1,200&family=Gochi+Hand&family=IBM+Plex+Mono:wght@300;400&family=Italiana&family=Josefin+Sans:wght@100;300&family=Libre+Baskerville:ital@0;1&family=Lobster&family=Monoton&family=Pacifico&family=Permanent+Marker&family=Playfair+Display:ital,wght@1,400;1,700&family=Raleway:wght@100;200&family=Righteous&family=Satisfy&family=Secular+One&family=Yeseva+One&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --ink: #0a0a0a;
  --border: #e8e8e8;
  --muted: #999;
  --hover-bg: #f5f5f5;
  --font-ui: 'Space Grotesk', sans-serif;
}

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-ui);
  min-height: 100vh;
}

/* HEADER */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 24px;
  padding: 0 40px;
  height: 64px;
}

.logo {
  font-family: var(--font-ui);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--ink);
  white-space: nowrap;
}

.logo span { color: var(--muted); font-weight: 300; }

.search-bar {
  position: relative;
  max-width: 480px;
  width: 100%;
}

.search-bar input {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 400;
  padding: 10px 16px;
  outline: none;
  color: var(--ink);
  background: var(--bg);
  transition: border-color 0.2s;
  letter-spacing: 0.01em;
}

.search-bar input:focus { border-color: var(--ink); }
.search-bar input::placeholder { color: #ccc; }

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.size-control {
  display: flex;
  align-items: center;
  gap: 10px;
}

.size-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  white-space: nowrap;
}

input[type="range"] {
  width: 100px;
  accent-color: var(--ink);
}

.size-val {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  min-width: 36px;
}

.copy-all-btn {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 600;
  padding: 8px 18px;
  border: 1.5px solid var(--ink);
  background: var(--ink);
  color: #fff;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.copy-all-btn:hover { background: #fff; color: var(--ink); }
/* FILTER ROW */
.filter-row {
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }

.filter-btn {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  padding: 10px 16px;
  border: none;
  background: none;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
  letter-spacing: 0.03em;
}
.filter-btn:hover { color: var(--ink); }
.filter-btn.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 600; }
/* PREVIEW TEXT HINT */
.preview-hint {
  padding: 14px 40px;
  font-size: 12px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.ph-count { font-weight: 600; color: var(--ink); }

/* FONT GRID */
.font-grid {
  display: flex;
  flex-direction: column;
}

.font-row {
  border-bottom: 1px solid var(--border);
  padding: 28px 40px;
  transition: background 0.15s;
  cursor: pointer;
  position: relative;
}
.font-row:hover { background: var(--hover-bg); }

.font-row-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.font-meta {
  display: flex;
  align-items: center;
  gap: 14px;
}

.font-name {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.02em;
}

.font-category {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--border);
  color: var(--muted);
  letter-spacing: 0.04em;
}

.font-vibe {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 400;
  color: var(--muted);
  font-style: italic;
}

.font-actions {
  display: flex;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.15s;
}
.font-row:hover .font-actions { opacity: 1; }

.fa-btn {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--ink);
}
.fa-btn:hover { border-color: var(--ink); }
.fa-btn.fav { background: #fff8e0; border-color: #f0c040; color: #8a6f00; }

.font-preview-text {
  line-height: 1.15;
  color: var(--ink);
  word-break: break-word;
  transition: font-size 0.1s;
}

/* EMPTY STATE */
.empty-state {
  padding: 80px 40px;
  text-align: center;
  color: var(--muted);
}
.es-icon { font-size: 36px; margin-bottom: 12px; }
.es-text { font-size: 15px; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--ink);
  color: #fff;
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 22px;
  border-radius: 8px;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* MOBILE */
@media (max-width: 640px) {
  header { grid-template-columns: 1fr; height: auto; padding: 14px 20px; gap: 12px; }
  .header-right { flex-wrap: wrap; }
  .filter-row { padding: 0 20px; }
  .font-row { padding: 22px 20px; }
  .preview-hint { padding: 12px 20px; }
  .logo { display: none; }
}
</style>
</head>
<body>
<header>
  <div class="logo">Font<span>Feels</span></div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Type something to preview all fonts..." oninput="updatePreview()" />
  </div>
  <div class="header-right">
    <div class="size-control">
      <span class="size-label">size</span>
      <input type="range" min="20" max="80" value="40" id="sizeSlider" oninput="updateSize()" step="1" />
      <span class="size-val" id="sizeVal">40px</span>
    </div>
    <button class="copy-all-btn" onclick="copyAll()">Copy text</button>
  </div>
</header>

<div class="filter-row" id="filterRow"></div>

<div class="preview-hint">
  <span>showing <span class="ph-count" id="visibleCount">24</span> fonts</span>
  <span>click any font to copy its name</span>
</div>

<div class="font-grid" id="fontGrid"></div>

<div class="toast" id="toast"></div>
<script>
const FONTS = [
  { name: "Abril Fatface",       category: "display",   vibe: "dramatic and bold — makes everything feel like a headline" },
  { name: "Alfa Slab One",       category: "display",   vibe: "punchy and strong — built for impact" },
  { name: "Architects Daughter", category: "handwritten", vibe: "casual and sketchy — feels like a sticky note" },
  { name: "Bebas Neue",          category: "display",   vibe: "tall and loud — the font that means business" },
  { name: "Caveat",              category: "handwritten", vibe: "loose and personal — like a diary entry" },
  { name: "Dancing Script",      category: "handwritten", vibe: "flowing and romantic — old love letters energy" },
  { name: "DM Serif Display",    category: "serif",     vibe: "elegant with attitude — refined but not boring" },
  { name: "Exo 2",               category: "sans",      vibe: "futuristic and thin — sci-fi without trying" },
  { name: "Gochi Hand",          category: "handwritten", vibe: "friendly and round — like a comic you'd actually read" },
  { name: "IBM Plex Mono",       category: "monospace", vibe: "clean and technical — for when you mean it" },
  { name: "Italiana",            category: "serif",     vibe: "luxury and high fashion — Vogue in a single word" },
  { name: "Josefin Sans",        category: "sans",      vibe: "geometric and minimal — Scandinavian design energy" },
  { name: "Libre Baskerville",   category: "serif",     vibe: "classic and trustworthy — reads like a proper book" },
  { name: "Lobster",             category: "display",   vibe: "retro diner vibes — warm and a little nostalgic" },
  { name: "Monoton",             category: "display",   vibe: "neon and outlined — feels like a sign in Vegas" },
  { name: "Pacifico",            category: "handwritten", vibe: "beach and laid back — summer in a font" },
  { name: "Permanent Marker",    category: "handwritten", vibe: "bold and messy — protest poster energy" },
  { name: "Playfair Display",    category: "serif",     vibe: "editorial and rich — the font of long reads" },
  { name: "Raleway",             category: "sans",      vibe: "light and airy — quietly sophisticated" },
  { name: "Righteous",           category: "display",   vibe: "groovy and confident — 70s with a gym membership" },
  { name: "Satisfy",             category: "handwritten", vibe: "cursive and charming — handwritten but intentional" },
  { name: "Secular One",         category: "sans",      vibe: "solid and modern — clean with a strong opinion" },
  { name: "Space Grotesk",       category: "sans",      vibe: "techy and approachable — startup without the cringe" },
  { name: "Yeseva One",          category: "serif",     vibe: "soft and expressive — literary and warm" },
];

const CATEGORIES = ["all", "sans", "serif", "display", "handwritten", "monospace"];
const CATEGORY_LABELS = { all: "All fonts", sans: "Sans-serif", serif: "Serif", display: "Display", handwritten: "Handwritten", monospace: "Monospace" };

let currentFilter = "all";
let previewText = "";
let fontSize = 40;
let favorites = new Set();

const DEFAULT_PREVIEWS = [
  "the quick brown fox",
  "hello world",
  "type something beautiful",
  "good morning",
  "stay curious",
  "this is your font",
];

function getPreview(fontName) {
  if (previewText.trim()) return previewText;
  const idx = FONTS.findIndex(f => f.name === fontName) % DEFAULT_PREVIEWS.length;
  return DEFAULT_PREVIEWS[idx];
}

function buildFilters() {
  const row = document.getElementById("filterRow");
  row.innerHTML = CATEGORIES.map(c => `
    <button class="filter-btn ${c === currentFilter ? 'active' : ''}" onclick="setFilter('${c}')">
      ${CATEGORY_LABELS[c]}
    </button>
  `).join("");
}

function setFilter(cat) {
  currentFilter = cat;
  buildFilters();
  renderFonts();
}

function getFiltered() {
  return currentFilter === "all" ? FONTS : FONTS.filter(f => f.category === currentFilter);
}

function renderFonts() {
  const filtered = getFiltered();
  const grid = document.getElementById("fontGrid");
  document.getElementById("visibleCount").textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="es-icon">🔍</div><div class="es-text">no fonts in this category</div></div>`;
    return;
  }

  grid.innerHTML = filtered.map(font => {
    const preview = getPreview(font.name);
    const isFav = favorites.has(font.name);
    return `
      <div class="font-row" onclick="copyFontName('${font.name}')">
        <div class="font-row-top">
          <div class="font-meta">
            <div class="font-name">${font.name}</div>
            <div class="font-category">${font.category}</div>
          </div>
          <div class="font-vibe">${font.vibe}</div>
          <div class="font-actions" onclick="event.stopPropagation()">
            <button class="fa-btn ${isFav ? 'fav' : ''}" onclick="toggleFav('${font.name}', this)">
              ${isFav ? '★ saved' : '☆ save'}
            </button>
            <button class="fa-btn" onclick="copySingle('${font.name}')">copy name</button>
          </div>
        </div>
        <div class="font-preview-text" style="font-family:'${font.name}',serif;font-size:${fontSize}px" id="preview-${font.name.replace(/\s/g,'_')}">
          ${escHtml(preview)}
        </div>
      </div>
    `;
  }).join("");
}

function updatePreview() {
  previewText = document.getElementById("searchInput").value;
  const filtered = getFiltered();
  filtered.forEach(font => {
    const el = document.getElementById("preview-" + font.name.replace(/\s/g, "_"));
    if (el) el.textContent = getPreview(font.name);
  });
}

function updateSize() {
  fontSize = parseInt(document.getElementById("sizeSlider").value);
  document.getElementById("sizeVal").textContent = fontSize + "px";
  document.querySelectorAll(".font-preview-text").forEach(el => {
    el.style.fontSize = fontSize + "px";
  });
}

function toggleFav(name, btn) {
  if (favorites.has(name)) {
    favorites.delete(name);
    btn.textContent = "☆ save";
    btn.classList.remove("fav");
  } else {
    favorites.add(name);
    btn.textContent = "★ saved";
    btn.classList.add("fav");
  }
}

function copyFontName(name) {
  navigator.clipboard.writeText(name).then(() => toast(`"${name}" copied`));
}

function copySingle(name) {
  navigator.clipboard.writeText(name).then(() => toast(`"${name}" copied`));
}

function copyAll() {
  const txt = previewText.trim() || "the quick brown fox";
  navigator.clipboard.writeText(txt).then(() => toast("Text copied to clipboard"));
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
